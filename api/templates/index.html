<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <h1>Learning Tool</h1>
    {% if contexts %}
    <div class="focus-areas">
      {% for ctx in contexts %}
      <a class="focus-area" href="/ui/{{ ctx | urlencode }}">{{ ctx }}</a>
      {% endfor %}
    </div>
    {% else %}
    <p class="muted">No contexts found.</p>
    {% endif %}
    <a class="muted" href="/admin">admin</a>
  </body>
</html>
