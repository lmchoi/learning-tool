<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — new context</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <h1>New context</h1>
    <form method="post" action="/admin/contexts">
      <label for="name">Context name</label>
      <input type="text" id="name" name="name" placeholder="e.g. python-asyncio" required />
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <button type="submit" class="submit">Create</button>
    </form>
    <a class="muted" href="/admin">← admin</a>
  </body>
</html>
