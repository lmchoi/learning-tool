<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ context_name }} — export</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <h1>{{ context_name }}</h1>
    <p class="muted">Copy the prompt below and paste it into your LLM chat for evaluation.</p>
    <pre id="export-prompt" class="export-prompt">{{ prompt }}</pre>
    <button
      onclick="navigator.clipboard.writeText(document.getElementById('export-prompt').textContent)"
      class="submit"
    >Copy to clipboard</button>
    <nav>
      <a href="/ui/{{ context_name | urlencode }}/capture">← new capture session</a>
      &nbsp;·&nbsp;
      <a href="/ui/{{ context_name | urlencode }}">home</a>
    </nav>
  </body>
</html>
