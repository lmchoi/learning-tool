<div id="annotation-area">
  <form
    hx-post="/annotate"
    hx-target="#annotation-area"
    hx-swap="outerHTML"
  >
    <input type="hidden" name="attempt_id" value="{{ attempt_id }}" />
    <input type="hidden" name="context_name" value="{{ context_name }}" />
    <input type="hidden" name="sentiment" value="{{ sentiment }}" />
    <span class="thumb-selected">{% if sentiment == "up" %}👍{% else %}👎{% endif %}</span>
    <textarea name="comment" rows="2" placeholder="Optional reason..."></textarea>
    <button type="submit">Submit</button>
  </form>
</div>
