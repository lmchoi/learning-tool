<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ context_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  </head>
  <body>
    <h1>{{ context_name }}</h1>
    <div
      id="question-area"
      hx-get="/ui/{{ context_name }}/question/bank?focus_area={{ query | urlencode }}&session_id={{ session_id }}"
      hx-trigger="load"
      hx-swap="outerHTML"
    >
      Loading question...
    </div>
    <nav>
      <a href="/ui/{{ context_name | urlencode }}/history">view history</a>
    </nav>
  </body>
</html>
