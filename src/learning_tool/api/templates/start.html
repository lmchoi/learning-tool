<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ context_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <h1>{{ context_name }}</h1>
    <nav>
      <a href="/ui/{{ context_name | urlencode }}/history">view history</a>
      <a href="/admin/annotations?context_name={{ context_name | urlencode }}">annotations</a>
    </nav>
    <p class="muted">Pick a focus area to practise.</p>
    {% if focus_areas %}
    <div class="focus-areas">
      {% for area in focus_areas %}
      <a class="focus-area" href="/ui/{{ context_name | urlencode }}?query={{ area | urlencode }}">{{ area }}</a>
      {% endfor %}
    </div>
    {% else %}
    <p class="muted">No focus areas configured for this context.</p>
    {% endif %}
  </body>
</html>
